<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网址导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(51, 65, 85, 0.8);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: rgba(148, 163, 184, 0.1);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --glass-blur: 12px;
            --sidebar-width: 260px;
        }

        .light-theme {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-card: rgba(255, 255, 255, 0.8);
            --bg-card-hover: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            transition: all 0.3s ease;
            position: relative;
            overflow-x: hidden;
            display: flex;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2%, 2%) rotate(1deg); }
            50% { transform: translate(0, 4%) rotate(0deg); }
            75% { transform: translate(-2%, 2%) rotate(-1deg); }
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-section {
            margin-bottom: 16px;
        }

        .sidebar-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            padding-left: 8px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .sidebar-item:hover {
            background: var(--bg-secondary);
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
        }

        .sidebar-item-icon {
            margin-right: 10px;
            font-size: 1.1rem;
        }

        .sidebar-item-count {
            margin-left: auto;
            background: rgba(99, 102, 241, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .sidebar-item.active .sidebar-item-count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 24px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
        }

        .header {
            margin-bottom: 24px;
        }

        .header-title {
            font-size: 2rem;
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .search-box {
            margin-bottom: 24px;
            position: relative;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 14px 48px 14px 20px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            color: var(--text-primary);
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .btn-icon {
            padding: 10px;
            border-radius: 10px;
        }

        .btn-sm {
            padding: 6px 10px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-edit {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: none;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-4px);
            background: var(--bg-card-hover);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            gap: 14px;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .card-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .card-url {
            color: var(--text-secondary);
            font-size: 0.8rem;
            word-break: break-all;
        }

        .card-sub-links {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .sub-link {
            display: flex;
            align-items: center;
            padding: 6px 0;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }

        .sub-link:hover {
            color: var(--accent-hover);
        }

        .sub-link-icon {
            margin-right: 8px;
            font-size: 0.9rem;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            position: absolute;
            top: 16px;
            right: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .card-category {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-hover);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 20px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.85rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .sub-links-input {
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 12px;
            background: var(--bg-secondary);
        }

        .sub-link-item {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .sub-link-item input {
            flex: 1;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .category-item span {
            color: var(--text-primary);
        }

        .category-count {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent-hover);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 10px;
        }

        /* Mobile */
        @media (max-width: 900px) {
            :root {
                --sidebar-width: 0px;
            }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .menu-toggle {
                display: block !important;
                position: fixed;
                top: 16px;
                left: 16px;
                z-index: 150;
            }

            .toolbar {
                padding-left: 50px;
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 16px;
            }
        }

        .menu-toggle {
            display: none;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .sidebar-overlay.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Mobile Menu Toggle -->
    <button class="btn btn-icon menu-toggle" onclick="toggleSidebar()" style="display:none;">
        <span>☰</span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">🔗 网址导航</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">快速访问</div>
            <div class="sidebar-item active" onclick="filterCategory('全部')" data-cat="全部">
                <span class="sidebar-item-icon">✨</span>
                <span>全部</span>
                <span class="sidebar-item-count" id="count-全部">0</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">分类</div>
            <div id="sidebarCategories"></div>
        </div>

        <div class="sidebar-section" style="margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border);">
            <div class="sidebar-item" onclick="openAddModal()">
                <span class="sidebar-item-icon">➕</span>
                <span>添加网址</span>
            </div>
            <div class="sidebar-item" onclick="openCategoryModal()">
                <span class="sidebar-item-icon">📁</span>
                <span>管理分类</span>
            </div>
            <div class="sidebar-item" onclick="exportData()">
                <span class="sidebar-item-icon">📤</span>
                <span>导出数据</span>
            </div>
            <div class="sidebar-item" onclick="document.getElementById('importFile').click()">
                <span class="sidebar-item-icon">📥</span>
                <span>导入数据</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="theme-toggle">
            <button class="btn btn-icon" onclick="toggleTheme()" title="切换主题">
                <span id="themeIcon">🌙</span>
            </button>
        </div>

        <div class="header">
            <div class="header-title" id="headerTitle">全部网站</div>
            <div class="header-subtitle" id="headerSubtitle">快速访问你收藏的网址</div>
        </div>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索网站..." style="padding-left: 48px;">
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="openAddModal()">
                <span>➕</span> 添加网址
            </button>
        </div>

        <div class="grid" id="grid"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-state-icon">🌐</div>
            <h3>暂无网址</h3>
            <p>点击"添加网址"按钮添加第一个网站</p>
        </div>
    </div>

    <!-- Hidden input -->
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

    <!-- Add/Edit Modal -->
    <div class="modal" id="urlModal">
        <div class="modal-content">
            <div class="modal-header" id="urlModalTitle">添加网址</div>
            <div class="form-group">
                <label>名称</label>
                <input type="text" id="siteName" placeholder="例如：同花顺">
            </div>
            <div class="form-group">
                <label>网址</label>
                <input type="text" id="siteUrl" placeholder="https://www.example.com">
            </div>
            <div class="form-group">
                <label>图标 (可选，emoji)</label>
                <input type="text" id="siteEmoji" placeholder="🔗">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="siteCategory"></select>
            </div>
            <div class="form-group">
                <label>子链接 (可选，每行格式：名称|网址)</label>
                <textarea id="siteSubLinks" placeholder="行情中心|https://q.10jqka.com.cn/&#10;数据中心|https://data.10jqka.com.cn/"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeUrlModal()">取消</button>
                <button class="btn btn-primary" onclick="saveUrl()">保存</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">管理分类</div>
            <div class="form-group">
                <label>添加新分类</label>
                <div style="display:flex;gap:8px;">
                    <input type="text" id="newCategory" placeholder="分类名称">
                    <button class="btn btn-primary" onclick="addCategory()">添加</button>
                </div>
            </div>
            <div class="form-group">
                <label>现有分类</label>
                <div id="categoryList"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCategoryModal()">关闭</button>
            </div>
        </div>
    </div>

        let editingIndex = -1;
        let searchQuery = '';

        function getFaviconUrl(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            } catch {
                return null;
            }
        }

        function init() {
            const saved = localStorage.getItem('navData');
            let shouldReset = false;

            if (saved) {
                data = JSON.parse(saved);
                const requiredCategories = ['期货', '股票', '宏观', '美国宏观', '政府', '投资工具', '产业链'];
                const hasAllCategories = requiredCategories.every(cat => data.categories.includes(cat));
                if (!hasAllCategories || data.sites.length < 20) {
                    shouldReset = true;
                }
            } else {
                shouldReset = true;
            }

            if (shouldReset) {
                data.sites = defaultSites;
                data.categories = ['期货', '股票', '宏观', '美国宏观', '政府', '投资工具', '产业链'];
                data.theme = 'dark';
                saveData();
            }

            if (data.theme === 'light') {
                document.body.classList.add('light-theme');
                document.getElementById('themeIcon').textContent = '☀️';
            }

            render();

            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderSites();
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            data.theme = document.body.classList.contains('light-theme') ? 'light' : 'dark';
            document.getElementById('themeIcon').textContent = data.theme === 'light' ? '☀️' : '🌙';
            saveData();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function saveData() {
            localStorage.setItem('navData', JSON.stringify(data));
        }

        function render() {
            renderCategories();
            renderSites();
        }

        function renderCategories() {
            // Sidebar categories
            const sidebarContainer = document.getElementById('sidebarCategories');
            sidebarContainer.innerHTML = data.categories.map(cat => {
                const count = data.sites.filter(s => s.category === cat).length;
                return `<div class="sidebar-item ${data.currentCategory === cat ? 'active' : ''}" onclick="filterCategory('${escapeHtml(cat)}')" data-cat="${escapeHtml(cat)}">
                    <span class="sidebar-item-icon">📁</span>
                    <span>${escapeHtml(cat)}</span>
                    <span class="sidebar-item-count">${count}</span>
                </div>`;
            }).join('');

            // Update counts
            document.getElementById('count-全部').textContent = data.sites.length;
            data.categories.forEach(cat => {
                const count = data.sites.filter(s => s.category === cat).length;
            });

            // Select options
            const select = document.getElementById('siteCategory');
            select.innerHTML = data.categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('');
        }

        function renderSites() {
            const container = document.getElementById('grid');
            const emptyState = document.getElementById('emptyState');

            let filteredSites = data.sites;
            if (data.currentCategory !== '全部') {
                filteredSites = filteredSites.filter(site => site.category === data.currentCategory);
            }

            if (searchQuery) {
                filteredSites = filteredSites.filter(site =>
                    site.name.toLowerCase().includes(searchQuery) ||
                    site.url.toLowerCase().includes(searchQuery) ||
                    (site.subLinks && site.subLinks.some(sl => sl.name.toLowerCase().includes(searchQuery) || sl.url.toLowerCase().includes(searchQuery)))
                );
            }

            // Update header
            document.getElementById('headerTitle').textContent = data.currentCategory === '全部' ? '全部网站' : data.currentCategory;
            document.getElementById('headerSubtitle').textContent = `共 ${filteredSites.length} 个网站`;

            if (filteredSites.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            container.innerHTML = filteredSites.map((site, idx) => {
                const originalIndex = data.sites.indexOf(site);
                const faviconUrl = getFaviconUrl(site.url);
                const emoji = site.emoji || '🔗';

                let iconHtml = `<span>${emoji}</span>`;
                if (faviconUrl) {
                    iconHtml = `<img src="${faviconUrl}" alt="" onerror="this.parentElement.innerHTML='<span>${emoji}</span>'">`;
                }

                let subLinksHtml = '';
                if (site.subLinks && site.subLinks.length > 0) {
                    subLinksHtml = '<div class="card-sub-links">' +
                        site.subLinks.map(sl =>
                            `<a class="sub-link" href="${escapeHtml(sl.url)}" target="_blank" onclick="event.stopPropagation()">
                                <span class="sub-link-icon">→</span>
                                <span>${escapeHtml(sl.name)}</span>
                            </a>`
                        ).join('') +
                        '</div>';
                }

                return `<div class="card">
                    <a class="card-link" href="${escapeHtml(site.url)}" target="_blank" onclick="event.stopPropagation()" style="text-decoration:none;color:inherit;display:block;">
                        <div class="card-header">
                            <div class="card-icon">${iconHtml}</div>
                            <div class="card-info">
                                <div class="card-title">${escapeHtml(site.name)}</div>
                                <div class="card-url">${escapeHtml(site.url)}</div>
                            </div>
                        </div>
                        ${subLinksHtml}
                        <span class="card-category">📁 ${escapeHtml(site.category)}</span>
                    </a>
                    <div class="card-actions">
                        <button class="btn btn-sm btn-edit" onclick="event.stopPropagation();editUrl(${originalIndex})">✏️</button>
                        <button class="btn btn-sm btn-delete" onclick="event.stopPropagation();deleteUrl(${originalIndex})">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function filterCategory(cat) {
            data.currentCategory = cat;
            saveData();

            // Update sidebar active state
            document.querySelectorAll('.sidebar-item').forEach(item => {
                if (item.dataset.cat === cat || (item.textContent.includes('全部') && cat === '全部')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            renderCategories();
            renderSites();

            // Close mobile sidebar
            if (window.innerWidth <= 900) {
                toggleSidebar();
            }
        }

        function openAddModal() {
            editingIndex = -1;
            document.getElementById('urlModalTitle').textContent = '添加网址';
            document.getElementById('siteName').value = '';
            document.getElementById('siteUrl').value = '';
            document.getElementById('siteEmoji').value = '';
            document.getElementById('siteCategory').value = data.categories[0] || '';
            document.getElementById('siteSubLinks').value = '';
            document.getElementById('urlModal').classList.add('active');
        }

        function editUrl(index) {
            editingIndex = index;
            const site = data.sites[index];
            document.getElementById('urlModalTitle').textContent = '编辑网址';
            document.getElementById('siteName').value = site.name;
            document.getElementById('siteUrl').value = site.url;
            document.getElementById('siteEmoji').value = site.emoji || '';
            document.getElementById('siteCategory').value = site.category;

            // Format sublinks
            if (site.subLinks && site.subLinks.length > 0) {
                document.getElementById('siteSubLinks').value = site.subLinks.map(sl => `${sl.name}|${sl.url}`).join('\n');
            } else {
                document.getElementById('siteSubLinks').value = '';
            }

            document.getElementById('urlModal').classList.add('active');
        }

        function closeUrlModal() {
            document.getElementById('urlModal').classList.remove('active');
        }

        function saveUrl() {
            const name = document.getElementById('siteName').value.trim();
            const url = document.getElementById('siteUrl').value.trim();
            const category = document.getElementById('siteCategory').value;
            const emoji = document.getElementById('siteEmoji').value.trim() || '🔗';
            const subLinksText = document.getElementById('siteSubLinks').value.trim();

            if (!name || !url) {
                alert('请填写名称和网址');
                return;
            }

            let fixedUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                fixedUrl = 'https://' + url;
            }

            // Parse sublinks
            let subLinks = [];
            if (subLinksText) {
                subLinks = subLinksText.split('\n').map(line => {
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        let slUrl = parts[1].trim();
                        if (!slUrl.startsWith('http://') && !slUrl.startsWith('https://')) {
                            slUrl = 'https://' + slUrl;
                        }
                        return { name: parts[0].trim(), url: slUrl };
                    }
                    return null;
                }).filter(sl => sl && sl.name && sl.url);
            }

            if (editingIndex >= 0) {
                data.sites[editingIndex] = { name, url: fixedUrl, category, emoji, subLinks };
            } else {
                data.sites.push({ name, url: fixedUrl, category, emoji, subLinks });
            }

            saveData();
            closeUrlModal();
            render();
        }

        function deleteUrl(index) {
            if (confirm('确定要删除这个网址吗？')) {
                data.sites.splice(index, 1);
                saveData();
                render();
            }
        }

        function openCategoryModal() {
            renderCategoryList();
            document.getElementById('categoryModal').classList.add('active');
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        function renderCategoryList() {
            const container = document.getElementById('categoryList');
            container.innerHTML = data.categories.map((cat, idx) => {
                const count = data.sites.filter(s => s.category === cat).length;
                return `<div class="category-item">
                    <div><span>${escapeHtml(cat)}</span> <span class="category-count">${count}</span></div>
                    ${data.categories.length > 1 ? `<button class="btn btn-sm btn-delete" onclick="deleteCategory(${idx})">删除</button>` : ''}
                </div>`;
            }).join('');
        }

        function addCategory() {
            const input = document.getElementById('newCategory');
            const name = input.value.trim();
            if (!name) return;
            if (data.categories.includes(name)) {
                alert('该分类已存在');
                return;
            }
            data.categories.push(name);
            saveData();
            input.value = '';
            renderCategoryList();
            renderCategories();
        }

        function deleteCategory(index) {
            const cat = data.categories[index];
            const count = data.sites.filter(s => s.category === cat).length;
            if (count > 0) {
                alert('该分类下还有 ' + count + ' 个网址，请先移动或删除这些网址');
                return;
            }
            if (confirm('确定要删除这个分类吗？')) {
                data.categories.splice(index, 1);
                if (data.currentCategory === cat) {
                    data.currentCategory = '全部';
                }
                saveData();
                renderCategoryList();
                render();
            }
        }

        // Import/Export
        function exportData() {
            const exportObj = {
                version: '1.0',
                exportDate: new Date().toISOString(),
                categories: data.categories,
                sites: data.sites
            };
            const dataStr = JSON.stringify(exportObj, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `web_navigation_backup_${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.categories && imported.sites) {
                        if (confirm(`确定要导入数据吗？\n\n分类: ${imported.categories.length} 个\n网址: ${imported.sites.length} 个\n\n这将覆盖当前所有数据！`)) {
                            data.categories = imported.categories;
                            data.sites = imported.sites;
                            data.currentCategory = '全部';
                            saveData();
                            render();
                            alert('导入成功！');
                        }
                    } else {
                        alert('无效的文件格式！');
                    }
                } catch (err) {
                    alert('导入失败: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modals on overlay click
        document.getElementById('urlModal').addEventListener('click', function(e) {
            if (e.target === this) closeUrlModal();
        });
        document.getElementById('categoryModal').addEventListener('click', function(e) {
            if (e.target === this) closeCategoryModal();
        });

        init();
    </script>
